work_dir: ./work_dir/kinetics/msg3d_joint_plus_no_dynamic

# feeder
feeder: feeders.feeder.Feeder
train_feeder_args:
  data_path: ./data/kinetics/train_data_joint.npy
  label_path: ./data/kinetics/train_label.pkl
  debug: False

test_feeder_args:
  data_path: ./data/kinetics/val_data_joint.npy
  label_path: ./data/kinetics/val_label.pkl

# model
model: model.msg3d_plus.Model
model_args:
  num_class: 400
  num_point: 18
  num_person: 2
  num_gcn_scales: 8
  num_g3d_scales: 8
  graph: graph.kinetics.AdjMatrixGraph
  in_channels: 3
  use_dynamic_topology: False
  use_part_branch: True
  num_part_scales: 4
  part_branch_stages: [1, 2, 3]

# optim
weight_decay: 0.0005
base_lr: 0.05
step: [45, 55]

# training
num_epoch: 65
device: [0, 1, 2, 3]
batch_size: 32
forward_batch_size: 16
test_batch_size: 16
nesterov: True
